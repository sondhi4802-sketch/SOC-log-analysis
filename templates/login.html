{% extends 'layout.html' %}

{% block css %}

<link rel="stylesheet"
href="{{ url_for('static', filename='css/login.css') }}">

{% endblock %}

{% block content %}

<div class="login-box">

    <h1>SOC LOG ANALYSIS</h1>
    
    {% if error %}
    <div class="alert alert-danger py-2" role="alert" style="font-size: 14px; background-color: #ff3b30; color: white; border: none;">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">LOGIN</button>
    </form>
    
    <p style="margin-top: 25px; font-size: 14px; color: #94a3b8;">
        Don't have an account? <a href="/register" style="color: cyan; text-decoration: none; font-weight: bold;">Sign Up here</a>
    </p>

</div>

{% endblock %}
